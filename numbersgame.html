<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Numbers Game</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔢</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0b0c10;
  --surface: #13151c;
  --border:  rgba(255,255,255,0.07);
  --ink:     #f0eee8;
  --dim:     rgba(240,238,232,0.38);
  --yellow:  #f5c842;
  --orange:  #f07a28;
  --cyan:    #2de2c8;
  --red:     #f0453a;
  --green:   #3ddc84;
  --blue:    #4a9eff;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'IBM Plex Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── GRID BACKGROUND ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(245,200,66,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,200,66,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
}
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(245,200,66,0.06), transparent 70%);
}

/* ── PAGE ── */
.page {
  position: relative; z-index: 1;
  max-width: 980px; margin: 0 auto;
  padding: 0 2.5rem 7rem;
}

/* ── HEADER ── */
.header {
  padding: 3rem 0 2.5rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  gap: 2rem;
}
.header-eyebrow {
  font-size: 0.6rem; letter-spacing: 0.4em; text-transform: uppercase;
  color: var(--yellow); margin-bottom: 0.5rem; opacity: 0.7;
}
h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3.5rem, 10vw, 7rem);
  letter-spacing: 0.04em; line-height: 0.9;
  color: var(--ink);
}
h1 span {
  display: inline;
  color: var(--yellow);
  text-shadow: 0 0 40px rgba(245,200,66,0.4);
}
.header-badge {
  border: 1px solid var(--border);
  border-radius: 8px; padding: 0.8rem 1.4rem; text-align: right;
  background: var(--surface);
  flex-shrink: 0;
}
.badge-label { font-size: 0.5rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--dim); display: block; margin-bottom: 0.3rem; }
.badge-val { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--cyan); letter-spacing: 0.1em; }

/* ── SETUP PANEL ── */
.setup-panel {
  margin-top: 2.5rem;
  display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem;
}
@media (max-width: 640px) { .setup-panel { grid-template-columns: 1fr; } }

.setup-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.6rem 1.8rem;
  position: relative; overflow: hidden;
}
.setup-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--yellow), transparent);
}
.setup-card.little::before { background: linear-gradient(90deg, var(--cyan), transparent); }

.setup-card-title {
  font-size: 0.55rem; letter-spacing: 0.35em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 0.3rem;
}
.setup-card-sub {
  font-size: 0.58rem; color: var(--dim); margin-bottom: 1.2rem; opacity: 0.6;
}

.counter-row { display: flex; align-items: center; gap: 1rem; }
.counter-btn {
  width: 44px; height: 44px; border-radius: 10px; border: 1px solid var(--border);
  background: rgba(255,255,255,0.04); color: var(--yellow);
  font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-family: 'IBM Plex Mono', monospace; line-height: 1;
  transition: background 0.15s, border-color 0.15s;
}
.counter-btn:hover { background: rgba(245,200,66,0.1); border-color: rgba(245,200,66,0.3); }
.counter-btn.little-btn { color: var(--cyan); }
.counter-btn.little-btn:hover { background: rgba(45,226,200,0.1); border-color: rgba(45,226,200,0.3); }
.counter-val {
  font-family: 'Bebas Neue', sans-serif; font-size: 3rem; color: var(--ink);
  min-width: 2rem; text-align: center; line-height: 1;
}

.total-bar {
  margin-top: 1.2rem;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 1rem 1.8rem;
  display: flex; align-items: center; justify-content: space-between; gap: 1rem;
}
.total-label { font-size: 0.55rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--dim); }
.total-pips { display: flex; gap: 0.5rem; }
.pip {
  width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
  transition: background 0.2s, border-color 0.2s;
  background: rgba(255,255,255,0.03);
}
.pip.big-pip { background: rgba(245,200,66,0.22); border-color: rgba(245,200,66,0.5); }
.pip.little-pip { background: rgba(45,226,200,0.16); border-color: rgba(45,226,200,0.4); }

/* ── GENERATE BUTTON ── */
.gen-wrap { margin-top: 1.6rem; }
.gen-btn {
  width: 100%; padding: 1.2rem 2rem;
  background: var(--yellow); color: var(--bg);
  border: none; border-radius: 14px; cursor: pointer;
  font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem;
  letter-spacing: 0.12em; line-height: 1;
  box-shadow: 0 4px 32px rgba(245,200,66,0.3);
  transition: transform 0.2s cubic-bezier(0.16,1,0.3,1), box-shadow 0.2s, background 0.2s;
}
.gen-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(245,200,66,0.45); background: #f7d15a; }
.gen-btn:active { transform: translateY(0); }

/* ── GAME ── */
#game { display: none; margin-top: 3rem; }
#game.on { display: block; }

/* TARGET */
.target-section { margin-bottom: 3rem; }
.section-eyebrow {
  font-size: 0.55rem; letter-spacing: 0.38em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem;
}
.section-eyebrow::after { content:''; flex:1; height:1px; background:var(--border); }

.target-box {
  background: var(--surface); border: 1px solid rgba(245,200,66,0.25);
  border-radius: 20px; padding: 2.5rem 2rem;
  text-align: center; position: relative; overflow: hidden;
  box-shadow: 0 0 60px rgba(245,200,66,0.07), inset 0 1px 0 rgba(255,255,255,0.04);
}
.target-box::before {
  content: 'TARGET';
  position: absolute; top: 1.2rem; left: 50%; transform: translateX(-50%);
  font-size: 0.5rem; letter-spacing: 0.5em; color: var(--yellow); opacity: 0.6;
}
.target-glow {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 300px; height: 200px;
  background: radial-gradient(ellipse, rgba(245,200,66,0.12), transparent 70%);
  pointer-events: none;
}
.target-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(7rem, 20vw, 14rem);
  line-height: 1; letter-spacing: 0.04em;
  color: var(--yellow);
  text-shadow: 0 0 80px rgba(245,200,66,0.5), 0 0 20px rgba(245,200,66,0.3);
  position: relative; z-index: 1;
  animation: flicker 8s ease-in-out infinite;
}
@keyframes flicker {
  0%,95%,100% { opacity:1; }
  96% { opacity:0.92; }
  97% { opacity:1; }
  98% { opacity:0.95; }
}

/* TILES */
.tiles-section { margin-bottom: 2.5rem; }
.tiles-grid {
  display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center;
}

.tile {
  width: 110px; height: 110px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 18px; cursor: pointer; user-select: none;
  position: relative; overflow: hidden;
  transition: transform 0.25s cubic-bezier(0.16,1,0.3,1), opacity 0.3s, box-shadow 0.25s;
}
.tile-inner {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3.2rem; letter-spacing: 0.04em; line-height: 1;
  position: relative; z-index: 1;
}
.tile.big-tile {
  background: linear-gradient(135deg, #1e1a0e, #2a2210);
  border: 2px solid rgba(245,200,66,0.45);
  box-shadow: 0 0 24px rgba(245,200,66,0.1), inset 0 1px 0 rgba(245,200,66,0.1);
  color: var(--yellow);
}
.tile.little-tile {
  background: linear-gradient(135deg, #0e1c1a, #0f2420);
  border: 2px solid rgba(45,226,200,0.35);
  box-shadow: 0 0 24px rgba(45,226,200,0.08), inset 0 1px 0 rgba(45,226,200,0.08);
  color: var(--cyan);
}
.tile:hover { transform: translateY(-6px) scale(1.06); }
.tile.big-tile:hover { box-shadow: 0 8px 30px rgba(245,200,66,0.25); }
.tile.little-tile:hover { box-shadow: 0 8px 30px rgba(45,226,200,0.2); }
.tile.used {
  opacity: 0.2; transform: scale(0.9);
  pointer-events: none; filter: grayscale(1);
}
.tile-label {
  position: absolute; bottom: 6px; left: 0; right: 0;
  text-align: center; font-size: 0.42rem; letter-spacing: 0.3em;
  text-transform: uppercase; opacity: 0.5;
}
.big-tile .tile-label { color: var(--yellow); }
.little-tile .tile-label { color: var(--cyan); }

/* click hint */
.tiles-hint {
  text-align: center; margin-top: 1rem;
  font-size: 0.55rem; letter-spacing: 0.2em; color: var(--dim);
  text-transform: uppercase;
}

/* SOLUTIONS */
.sol-btn {
  width: 100%; margin-top: 1.5rem; padding: 1.1rem 2rem;
  background: transparent; border: 1px solid var(--border);
  border-radius: 14px; cursor: pointer;
  font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem;
  letter-spacing: 0.25em; text-transform: uppercase; color: var(--dim);
  transition: all 0.25s;
}
.sol-btn:hover { border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 20px rgba(45,226,200,0.1); }
.sol-btn.busy { opacity: 0.5; pointer-events: none; }

#sol-panel { display: none; margin-top: 2rem; }
#sol-panel.on { display: block; }

.sol-section-label {
  font-size: 0.52rem; letter-spacing: 0.35em; text-transform: uppercase;
  margin: 1.4rem 0 0.8rem;
  display: flex; align-items: center; gap: 0.8rem;
}
.sol-section-label::after { content:''; flex:1; height:1px; background:var(--border); }
.sol-section-label.exact { color: var(--green); }
.sol-section-label.close  { color: var(--blue); }

/* Grid of solution cards */
.sol-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 0.9rem;
}

/* Each solution card */
.sol-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 1rem 1.2rem;
  opacity: 0; animation: fadeUp 0.3s ease forwards;
  overflow: hidden;
}
.sol-card.exact { border-left: 3px solid var(--green); }
.sol-card.close  { border-left: 3px solid var(--blue); }

/* Step-by-step table inside each card */
.steps-table {
  width: 100%; border-collapse: collapse;
  font-size: 0.92rem; color: var(--ink);
  font-family: 'IBM Plex Mono', monospace;
}
.steps-table td { padding: 0.18rem 0; white-space: nowrap; }
/* left col: the expression e.g. "75 − 7" */
.steps-table .td-expr { text-align: right; padding-right: 0.5rem; }
/* middle col: the "=" sign — all vertically aligned */
.steps-table .td-eq   { text-align: center; padding: 0 0.4rem; color: var(--dim); width: 1.2rem; }
/* right col: the result */
.steps-table .td-res  { text-align: left; font-weight: 600; }
/* final result row gets highlighted */
.steps-table tr.final .td-res { color: var(--green); }
.steps-table tr.close-final .td-res { color: var(--blue); }

.sol-diff { font-size: 0.55rem; color: var(--dim); margin-top: 0.5rem; letter-spacing: 0.1em; }

.no-sol {
  text-align: center; padding: 2.5rem;
  font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim);
}

/* FOOTER */
.foot {
  margin-top: 5rem; padding-top: 1.5rem;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.foot-copy { font-size: 0.52rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); }
.foot-link { font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim); text-decoration: none; transition: color 0.2s; }
.foot-link:hover { color: var(--yellow); }

@keyframes fadeUp {
  from { opacity:0; transform: translateY(8px); }
  to   { opacity:1; transform: translateY(0); }
}

@media (max-width: 600px) {
  .page { padding: 0 1.2rem 6rem; }
  .header { flex-direction: column; align-items: flex-start; gap: 1rem; }
  .tile { width: 82px; height: 82px; border-radius: 14px; }
  .tile-inner { font-size: 2.4rem; }
  .target-num { font-size: clamp(5rem,20vw,9rem); }
}
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div>
      <div class="header-eyebrow">Starter Activity</div>
      <h1>THE <span>NUMBERS</span> GAME</h1>
    </div>
    <div class="header-badge">
      <span class="badge-label">Numbers</span>
      <span class="badge-val" id="badge-total">6</span>
    </div>
  </div>

  <!-- SETUP -->
  <div class="setup-panel">

    <div class="setup-card">
      <div class="setup-card-title">Big Numbers</div>
      <div class="setup-card-sub">25 · 50 · 75 · 100 — repeats allowed</div>
      <div class="counter-row">
        <button class="counter-btn" onclick="change('big',-1)">−</button>
        <span class="counter-val" id="big-val">2</span>
        <button class="counter-btn" onclick="change('big',1)">+</button>
      </div>
    </div>

    <div class="setup-card little">
      <div class="setup-card-title">Little Numbers</div>
      <div class="setup-card-sub">1 – 10 — repeats allowed</div>
      <div class="counter-row">
        <button class="counter-btn little-btn" onclick="change('little',-1)">−</button>
        <span class="counter-val" id="little-val">4</span>
        <button class="counter-btn little-btn" onclick="change('little',1)">+</button>
      </div>
    </div>

  </div>

  <!-- PIP BAR -->
  <div class="total-bar">
    <span class="total-label">Total &nbsp;—&nbsp; <span id="total-txt" style="color:var(--yellow)">6 / 6</span></span>
    <div class="total-pips" id="pips"></div>
  </div>

  <!-- GENERATE -->
  <div class="gen-wrap">
    <button class="gen-btn" id="gen-btn" onclick="generate()">GENERATE</button>
  </div>

  <!-- GAME -->
  <div id="game">

    <div class="target-section">
      <div class="section-eyebrow">Target</div>
      <div class="target-box">
        <div class="target-glow"></div>
        <div class="target-num" id="target-num">—</div>
      </div>
    </div>

    <div class="tiles-section">
      <div class="section-eyebrow">Your Numbers</div>
      <div class="tiles-grid" id="tiles"></div>
      <div class="tiles-hint">↑ tap a tile to mark it used</div>
    </div>

    <button class="sol-btn" id="sol-btn" onclick="showSolutions()">
      Show All Solutions
    </button>

    <div id="sol-panel">
      <div id="sol-content"></div>
    </div>

  </div>

  <footer class="foot">
    <span class="foot-copy">© 2026 K Williamson</span>
  </footer>

</div>
<script>
// ── STATE ──
let bigN = 2, littleN = 4, numbers = [], target = 0;
const BIG_POOL = [25, 50, 75, 100];

// ── PICKERS ──
function change(type, d) {
  if (type === 'big') {
    bigN = Math.max(0, Math.min(6, bigN + d));
    littleN = 6 - bigN;
  } else {
    littleN = Math.max(0, Math.min(6, littleN + d));
    bigN = 6 - littleN;
  }
  document.getElementById('big-val').textContent = bigN;
  document.getElementById('little-val').textContent = littleN;
  renderPips();
}

function renderPips() {
  const total = bigN + littleN;
  document.getElementById('total-txt').textContent = `${total} / 6`;
  document.getElementById('total-txt').style.color = total === 6 ? 'var(--yellow)' : 'var(--red)';
  const pips = document.getElementById('pips');
  pips.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const p = document.createElement('div');
    p.className = 'pip' + (i < bigN ? ' big-pip' : i < bigN + littleN ? ' little-pip' : '');
    pips.appendChild(p);
  }
  document.getElementById('gen-btn').style.opacity = total === 6 ? '1' : '0.4';
  document.getElementById('gen-btn').style.pointerEvents = total === 6 ? 'auto' : 'none';
}

// ── GENERATE ──
function generate() {
  if (bigN + littleN !== 6) return;
  numbers = [];
  for (let i = 0; i < bigN; i++) {
    numbers.push({ val: BIG_POOL[Math.floor(Math.random() * BIG_POOL.length)], big: true });
  }
  for (let i = 0; i < littleN; i++) {
    numbers.push({ val: Math.floor(Math.random() * 10) + 1, big: false });
  }
  // shuffle
  for (let i = numbers.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
  }
  target = Math.floor(Math.random() * 900) + 100;
  renderGame();
}

function renderGame() {
  document.getElementById('target-num').textContent = target;

  const grid = document.getElementById('tiles');
  grid.innerHTML = '';
  numbers.forEach((n, i) => {
    const t = document.createElement('div');
    t.className = 'tile ' + (n.big ? 'big-tile' : 'little-tile');
    t.innerHTML = `<div class="tile-inner">${n.val}</div><div class="tile-label">${n.big ? 'big' : 'small'}</div>`;
    t.onclick = () => t.classList.toggle('used');
    grid.appendChild(t);
  });

  document.getElementById('sol-panel').classList.remove('on');
  document.getElementById('sol-panel').style.display = 'none';
  document.getElementById('sol-content').innerHTML = '';
  const btn = document.getElementById('sol-btn');
  btn.classList.remove('busy');
  btn.textContent = 'Show All Solutions';

  const game = document.getElementById('game');
  game.style.display = 'block';
  game.classList.add('on');
  game.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── SOLVER ──
// Each node tracks: val (number), steps (array of {lhs, op, rhs, result})
// Steps accumulate as sub-trees are combined, giving us a flat list of operations.

function applyOp(a, b, op) {
  if (op === '+') return a + b;
  if (op === '−') return a - b;
  if (op === '×') return a * b;
  if (op === '÷') return (b !== 0 && a % b === 0) ? a / b : null;
}

// Build all expression trees from an array of numbers.
// Returns array of { val, steps: [{lhs, op, rhs, result}, ...] }
function buildExprs(nums) {
  if (nums.length === 1) {
    return [{ val: nums[0], steps: [] }];
  }
  const results = [];
  for (let mask = 1; mask < (1 << nums.length) - 1; mask++) {
    const L = [], R = [];
    for (let i = 0; i < nums.length; i++) (mask & (1 << i) ? L : R).push(nums[i]);
    for (const le of buildExprs(L)) {
      for (const re of buildExprs(R)) {
        for (const op of ['+', '−', '×', '÷']) {
          const v = applyOp(le.val, re.val, op);
          if (v === null || v <= 0) continue;
          // Combine steps: left subtree steps, then right subtree steps, then this operation
          const newSteps = [
            ...le.steps,
            ...re.steps,
            { lhs: le.val, op, rhs: re.val, result: v }
          ];
          results.push({ val: v, steps: newSteps });
        }
      }
    }
  }
  return results;
}

function perms(arr) {
  if (arr.length <= 1) return [arr];
  const out = [];
  for (let i = 0; i < arr.length; i++) {
    const rest = [...arr.slice(0, i), ...arr.slice(i + 1)];
    for (const p of perms(rest)) out.push([arr[i], ...p]);
  }
  return out;
}

// Deduplicate solutions by their step fingerprint
function stepsKey(steps) {
  return steps.map(s => `${s.lhs}${s.op}${s.rhs}=${s.result}`).join('|');
}

function solve(nums, tgt) {
  const exactKeys = new Set();
  const exactSols = [];
  const closeMap  = new Map(); // value -> steps

  const n = nums.length;
  for (let mask = 1; mask < (1 << n); mask++) {
    const sub = [];
    for (let i = 0; i < n; i++) if (mask & (1 << i)) sub.push(nums[i]);
    for (const perm of perms(sub)) {
      for (const e of buildExprs(perm)) {
        const key = stepsKey(e.steps);
        if (e.val === tgt) {
          if (!exactKeys.has(key)) {
            exactKeys.add(key);
            exactSols.push(e.steps);
          }
        } else if (Math.abs(e.val - tgt) <= 10 && e.val > 0 && !closeMap.has(e.val)) {
          closeMap.set(e.val, e.steps);
        }
      }
      if (exactSols.length >= 100) break;
    }
    if (exactSols.length >= 100) break;
  }
  return { exactSols: exactSols.slice(0, 60), closeMap };
}

// Render one solution card as a step-by-step table
function renderCard(steps, finalVal, cardClass, animDelay) {
  const card = document.createElement('div');
  card.className = `sol-card ${cardClass}`;
  card.style.animationDelay = `${animDelay}s`;

  const table = document.createElement('table');
  table.className = 'steps-table';

  steps.forEach((s, i) => {
    const tr = document.createElement('tr');
    const isFinal = i === steps.length - 1;
    if (isFinal) tr.className = cardClass === 'exact' ? 'final' : 'close-final';

    const exprTd = document.createElement('td');
    exprTd.className = 'td-expr';
    exprTd.textContent = `${s.lhs} ${s.op} ${s.rhs}`;

    const eqTd = document.createElement('td');
    eqTd.className = 'td-eq';
    eqTd.textContent = '=';

    const resTd = document.createElement('td');
    resTd.className = 'td-res';
    resTd.textContent = s.result;

    tr.appendChild(exprTd);
    tr.appendChild(eqTd);
    tr.appendChild(resTd);
    table.appendChild(tr);
  });

  card.appendChild(table);
  return card;
}

// ── SHOW SOLUTIONS ──
function showSolutions() {
  const btn = document.getElementById('sol-btn');
  btn.classList.add('busy');
  btn.textContent = 'Solving…';
  setTimeout(() => {
    const { exactSols, closeMap } = solve(numbers.map(n => n.val), target);
    const content = document.getElementById('sol-content');
    content.innerHTML = '';

    if (exactSols.length === 0 && closeMap.size === 0) {
      content.innerHTML = '<div class="no-sol">No solutions found for this combination.</div>';
    } else {
      if (exactSols.length > 0) {
        const lbl = document.createElement('div');
        lbl.className = 'sol-section-label exact';
        lbl.textContent = `Exact Solutions — ${exactSols.length}${exactSols.length >= 60 ? '+' : ''}`;
        content.appendChild(lbl);

        const list = document.createElement('div');
        list.className = 'sol-list';
        exactSols.forEach((steps, i) => {
          list.appendChild(renderCard(steps, target, 'exact', i * 0.02));
        });
        content.appendChild(list);
      }

      const closeArr = [...closeMap.entries()]
        .sort((a, b) => Math.abs(a[0] - target) - Math.abs(b[0] - target))
        .slice(0, 12);

      if (closeArr.length > 0) {
        const lbl = document.createElement('div');
        lbl.className = 'sol-section-label close';
        lbl.textContent = 'Close (within 10)';
        content.appendChild(lbl);

        const list = document.createElement('div');
        list.className = 'sol-list';
        closeArr.forEach(([val, steps], i) => {
          const card = renderCard(steps, val, 'close', (exactSols.length + i) * 0.02);
          const diff = val - target;
          const diffDiv = document.createElement('div');
          diffDiv.className = 'sol-diff';
          diffDiv.textContent = `${diff > 0 ? '+' : ''}${diff} from target`;
          card.appendChild(diffDiv);
          list.appendChild(card);
        });
        content.appendChild(list);
      }
    }

    const panel = document.getElementById('sol-panel');
    panel.style.display = 'block';
    panel.classList.add('on');
    btn.classList.remove('busy');
    btn.textContent = 'Recalculate Solutions';
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 40);
}

// ── INIT ──
renderPips();
