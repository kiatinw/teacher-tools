<script>
  window._docxReady = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.min.js';
    s.onload = resolve;
    s.onerror = () => reject(new Error('Failed to load docx library'));
    document.head.appendChild(s);
  });
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  input, select, textarea, button { font-family: 'DM Sans', sans-serif; }

  /* ── Login ── */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .login-card {
    background: #18181b; border: 1px solid #2a2a2f; border-radius: 16px;
    padding: 48px 40px; width: 360px; text-align: center;
    animation: fadeUp 0.4s ease;
  }
  .login-card h1 { font-family: 'Syne', sans-serif; font-size: 22px; color: #fff; margin: 8px 0 4px; }
  .login-card p.sub { color: #666; font-size: 13px; margin-bottom: 28px; }
  .login-card input {
    width: 100%; padding: 12px 16px; border-radius: 8px;
    background: #0d0d0f; border: 1px solid #2a2a2f; color: #fff;
    font-size: 15px; margin-bottom: 8px; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .login-card input:focus { outline: none; border-color: #e05c2e; box-shadow: 0 0 0 3px rgba(224,92,46,0.2); }
  .login-card input.error { border-color: #ef476f; }
  .login-card .err-msg { color: #ef476f; font-size: 12px; margin-bottom: 10px; min-height: 18px; }
  .login-card button {
    width: 100%; padding: 12px; border-radius: 8px; background: #e05c2e;
    color: #fff; border: none; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: background 0.2s;
  }
  .login-card button:hover { background: #c44e24; }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)}
  }
  .shake { animation: shake 0.4s ease !important; }

  /* ── App ── */
  #app-screen { display: none; }
  .topbar {
    background: #0f0f14; border-bottom: 1px solid #1e1e26;
    padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar-left span.icon { font-size: 20px; }
  .topbar-left span.title { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; color: #fff; }
  .topbar-right { font-size: 12px; color: #555; }
  .main { max-width: 860px; margin: 0 auto; padding: 32px 24px; }

  .section {
    background: #0f0f14; border: 1px solid #1e1e26; border-radius: 12px;
    padding: 24px 24px 8px; margin-bottom: 20px;
  }
  .section-title {
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
    color: #1a4f8c; margin-bottom: 18px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field { margin-bottom: 18px; }
  .field label {
    display: block; color: #9ca3af; font-size: 11px; font-weight: 500;
    margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .field label .req { color: #e05c2e; margin-left: 3px; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 9px 12px; border-radius: 7px;
    background: #0f0f11; border: 1px solid #2a2a30; color: #e5e7eb;
    font-size: 14px; transition: border-color 0.15s; appearance: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: #1a4f8c; box-shadow: 0 0 0 2px rgba(26,79,140,0.2);
  }
  .field textarea { resize: vertical; min-height: 80px; }

  /* Outcomes */
  .outcome-list { display: flex; flex-direction: column; gap: 8px; }
  .outcome-chip {
    display: flex; align-items: center; gap: 12; padding: 10px 14px; border-radius: 8px;
    border: 1px solid #2a2a30; background: #0f0f11; cursor: pointer;
    transition: border-color 0.15s, background 0.15s; gap: 12px;
  }
  .outcome-chip:hover { border-color: #1a4f8c; }
  .outcome-chip.selected { border-color: #1a4f8c; background: rgba(26,79,140,0.12); }
  .outcome-chip .oc-code { min-width: 88px; font-weight: 700; font-size: 12px; color: #555; }
  .outcome-chip.selected .oc-code { color: #6da4e8; }
  .outcome-chip .oc-desc { font-size: 13px; color: #666; line-height: 1.4; flex: 1; }
  .outcome-chip.selected .oc-desc { color: #cbd5e1; }
  .outcome-chip .oc-check {
    min-width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0;
    border: 1px solid #3a3a42; display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #fff;
  }
  .outcome-chip.selected .oc-check { background: #1a4f8c; border-color: #1a4f8c; }
  .outcome-count { color: #1a4f8c; font-size: 12px; margin-top: 10px; }
  .outcome-hint { color: #555; font-size: 12px; margin-bottom: 14px; }

  /* Generate button */
  .gen-wrap { text-align: center; margin-top: 32px; margin-bottom: 40px; }
  .gen-btn {
    background: #1a4f8c; color: #fff; border: none; border-radius: 10px;
    padding: 14px 48px; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: background 0.2s; min-width: 220px;
  }
  .gen-btn:hover { background: #153f72; }
  .gen-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .gen-btn.success { background: #065f46; }
  .gen-hint { color: #555; font-size: 12px; margin-top: 10px; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .main { animation: fadeUp 0.4s ease; }
</style>
</head>
<body>

<!-- ══════════════ LOGIN ══════════════ -->
<div id="login-screen">
  <div class="login-card" id="login-card">
    <div style="font-size:40px">🏫</div>
    <h1>Maths Tools</h1>
    <p class="sub">Staff access only</p>
    <input type="password" id="pw-input" placeholder="Enter password" />
    <p class="err-msg" id="err-msg"></p>
    <button onclick="tryLogin()">Sign In</button>
  </div>
</div>

<!-- ══════════════ APP ══════════════ -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-left">
      <span class="icon">📋</span>
      <span class="title">Assessment Notification Generator</span>
    </div>
    <div class="topbar-right">Maths · Years 7–12</div>
  </div>

  <div class="main">

    <!-- School -->
    <div class="section">
      <div class="section-title">School</div>
      <div class="field">
        <label>School Name <span class="req">*</span></label>
        <input type="text" id="f-school" placeholder="e.g. Leeton High School" />
      </div>
    </div>

    <!-- Course -->
    <div class="section">
      <div class="section-title">Course</div>
      <div class="grid-2">
        <div class="field">
          <label>Year Group <span class="req">*</span></label>
          <select id="f-year" onchange="onYearChange()"></select>
        </div>
        <div class="field">
          <label>Course <span class="req">*</span></label>
          <select id="f-course" onchange="onCourseChange()"></select>
        </div>
      </div>
    </div>

    <!-- Task Details -->
    <div class="section">
      <div class="section-title">Task Details</div>
      <div class="grid-2">
        <div class="field">
          <label>Task Name <span class="req">*</span></label>
          <input type="text" id="f-taskname" placeholder="e.g. Algebraic Techniques Test" />
        </div>
        <div class="field">
          <label>Task Type <span class="req">*</span></label>
          <select id="f-tasktype"></select>
        </div>
        <div class="field">
          <label>Task Number</label>
          <select id="f-tasknum"></select>
        </div>
        <div class="field">
          <label>Term</label>
          <select id="f-term"></select>
        </div>
        <div class="field">
          <label>Due Date <span class="req">*</span></label>
          <input type="date" id="f-duedate" />
        </div>
        <div class="field">
          <label>Duration / Length</label>
          <input type="text" id="f-duration" placeholder="e.g. 50 minutes / 3 pages" />
        </div>
        <div class="field">
          <label>Weighting (%)</label>
          <input type="number" id="f-weighting" min="0" max="100" placeholder="e.g. 20" />
        </div>
      </div>
    </div>

    <!-- Outcomes -->
    <div class="section">
      <div class="section-title">Syllabus Outcomes</div>
      <p class="outcome-hint">Select all outcomes assessed by this task</p>
      <div class="outcome-list" id="outcome-list"></div>
      <p class="outcome-count" id="outcome-count"></p>
    </div>

    <!-- Description -->
    <div class="section">
      <div class="section-title">Task Description</div>
      <div class="field">
        <label>Description of Task</label>
        <textarea id="f-desc" placeholder="Describe what students need to do, the format of the task, and any special conditions..."></textarea>
      </div>
      <div class="field">
        <label>Topics / Content Covered</label>
        <textarea id="f-topics" style="min-height:70px" placeholder="e.g. Linear equations, substitution, expanding brackets..."></textarea>
      </div>
    </div>

    <!-- Generate -->
    <div class="gen-wrap">
      <button class="gen-btn" id="gen-btn" onclick="generateDocx()">⬇  Generate .docx</button>
      <p class="gen-hint">Downloads a formatted Word document ready to print or share</p>
    </div>

  </div>
</div>

function tryLogin() {
  const val = document.getElementById('pw-input').value;
  const card = document.getElementById('login-card');
  const err = document.getElementById('err-msg');
  const inp = document.getElementById('pw-input');
  if (val === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    initApp();
  } else {
    err.textContent = 'Incorrect password. Try again.';
    inp.classList.add('error');
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 500);
  }
}
document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
document.getElementById('pw-input').addEventListener('input', () => {
  document.getElementById('err-msg').textContent = '';
  document.getElementById('pw-input').classList.remove('error');
});

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
function initApp() {
  // Year dropdown
  const yearSel = document.getElementById('f-year');
  Object.keys(COURSES).forEach(y => {
    const o = document.createElement('option'); o.value = y; o.textContent = y; yearSel.appendChild(o);
  });

  // Task types
  const typeSel = document.getElementById('f-tasktype');
  TASK_TYPES.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; typeSel.appendChild(o); });

  // Task number
  const numSel = document.getElementById('f-tasknum');
  [1,2,3,4,5,6].forEach(n => { const o = document.createElement('option'); o.value = n; o.textContent = n; numSel.appendChild(o); });

  // Term
  const termSel = document.getElementById('f-term');
  [1,2,3,4].forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; termSel.appendChild(o); });

  onYearChange();
}

function onYearChange() {
  const year = document.getElementById('f-year').value;
  const courseSel = document.getElementById('f-course');
  courseSel.innerHTML = '';
  COURSES[year].forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; courseSel.appendChild(o); });
  selectedOutcomes.clear();
  renderOutcomes();
}

function onCourseChange() {
  selectedOutcomes.clear();
  renderOutcomes();
}

function renderOutcomes() {
  const course = document.getElementById('f-course').value;
  const list = document.getElementById('outcome-list');
  const count = document.getElementById('outcome-count');
  list.innerHTML = '';
  const outcomes = OUTCOMES[course] || [];
  outcomes.forEach(o => {
    const div = document.createElement('div');
    div.className = 'outcome-chip' + (selectedOutcomes.has(o.code) ? ' selected' : '');
    div.innerHTML = `
      <span class="oc-code">${o.code}</span>
      <span class="oc-desc">${o.desc}</span>
      <span class="oc-check">${selectedOutcomes.has(o.code) ? '✓' : ''}</span>
    `;
    div.addEventListener('click', () => {
      if (selectedOutcomes.has(o.code)) selectedOutcomes.delete(o.code);
      else selectedOutcomes.add(o.code);
      renderOutcomes();
    });
    list.appendChild(div);
  });
  const n = selectedOutcomes.size;
  count.textContent = n > 0 ? `${n} outcome${n !== 1 ? 's' : ''} selected` : '';
}

// ══════════════════════════════════════════════════════
// GENERATE DOCX
// ══════════════════════════════════════════════════════
async function generateDocx() {
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.textContent = 'Generating...';

  try {
    await window._docxReady;
    const {
      Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
      AlignmentType, BorderStyle, WidthType, ShadingType, VerticalAlign,
    } = window.docx;

    const school    = document.getElementById('f-school').value;
    const year      = document.getElementById('f-year').value;
    const course    = document.getElementById('f-course').value;
    const taskName  = document.getElementById('f-taskname').value;
    const taskType  = document.getElementById('f-tasktype').value;
    const taskNum   = document.getElementById('f-tasknum').value;
    const term      = document.getElementById('f-term').value;
    const dueDateRaw= document.getElementById('f-duedate').value;
    const weighting = document.getElementById('f-weighting').value;
    const duration  = document.getElementById('f-duration').value;
    const desc      = document.getElementById('f-desc').value;
    const topics    = document.getElementById('f-topics').value;

    const formatDate = (d) => {
      if (!d) return '';
      const dt = new Date(d + 'T00:00:00');
      return dt.toLocaleDateString('en-AU', { day: '2-digit', month: 'long', year: 'numeric' });
    };

    const bdr = { style: BorderStyle.SINGLE, size: 4, color: 'CCCCCC' };
    const borders = { top: bdr, bottom: bdr, left: bdr, right: bdr };

    const cell = (text, opts = {}) => new TableCell({
      borders,
      width: opts.width ? { size: opts.width, type: WidthType.DXA } : undefined,
      shading: opts.shade ? { fill: opts.shade, type: ShadingType.CLEAR } : undefined,
      verticalAlign: VerticalAlign.CENTER,
      margins: { top: 80, bottom: 80, left: 120, right: 120 },
      children: [new Paragraph({
        alignment: opts.align || AlignmentType.LEFT,
        children: [new TextRun({ text: String(text || ''), bold: opts.bold, size: opts.size || 20, font: 'Arial', color: opts.color || '000000' })]
      })]
    });

    const row = (label, value) => new TableRow({ children: [
      cell(label, { width: 3000, shade: 'EBF2FA', bold: true, size: 19 }),
      cell(value,  { width: 6026 }),
    ]});

    const heading = (text) => new Paragraph({
      spacing: { before: 200, after: 100 },
      border: { bottom: { style: BorderStyle.SINGLE, size: 6, color: '1a4f8c', space: 4 } },
      children: [new TextRun({ text, bold: true, size: 22, font: 'Arial', color: '1a4f8c' })]
    });

    // Outcomes
    const allOutcomes = OUTCOMES[course] || [];
    const selOutcomes = allOutcomes.filter(o => selectedOutcomes.has(o.code));
    const outcomeRows = selOutcomes.length > 0
      ? [
          new TableRow({ children: [
            cell('Code',        { width: 1800, shade: '1a4f8c', bold: true, color: 'FFFFFF', size: 18 }),
            cell('Description', { width: 7226, shade: '1a4f8c', bold: true, color: 'FFFFFF', size: 18 }),
          ]}),
          ...selOutcomes.map((o, i) => new TableRow({ children: [
            cell(o.code, { width: 1800, shade: i % 2 === 0 ? 'FFFFFF' : 'F4F8FD', bold: true, size: 18 }),
            cell(o.desc, { width: 7226, shade: i % 2 === 0 ? 'FFFFFF' : 'F4F8FD', size: 18 }),
          ]}))
        ]
      : [new TableRow({ children: [cell('No outcomes selected', { width: 9026, size: 19, color: '999999' })] })];

    const children = [
      new Paragraph({
        alignment: AlignmentType.CENTER, spacing: { after: 0 },
        children: [new TextRun({ text: school || 'School Name', bold: true, size: 28, font: 'Arial', color: '1a4f8c' })]
      }),
      new Paragraph({
        alignment: AlignmentType.CENTER, spacing: { after: 80 },
        children: [new TextRun({ text: 'Mathematics Department', size: 22, font: 'Arial', color: '555555' })]
      }),
      new Paragraph({
        alignment: AlignmentType.CENTER,
        border: {
          top:    { style: BorderStyle.SINGLE, size: 12, color: '1a4f8c', space: 4 },
          bottom: { style: BorderStyle.SINGLE, size: 12, color: '1a4f8c', space: 4 },
        },
        spacing: { before: 80, after: 200 },
        children: [new TextRun({ text: `ASSESSMENT NOTIFICATION — TASK ${taskNum}`, bold: true, size: 26, font: 'Arial', color: '1a4f8c' })]
      }),

      heading('Task Details'),
      new Table({
        width: { size: 9026, type: WidthType.DXA }, columnWidths: [3000, 6026],
        rows: [
          row('Course', course), row('Year', year), row('Task Name', taskName),
          row('Task Type', taskType), row('Task Number', `Task ${taskNum}`),
          row('Term', `Term ${term}`), row('Due Date', formatDate(dueDateRaw)),
          row('Weighting', weighting ? `${weighting}%` : ''), row('Duration / Length', duration),
        ]
      }),

      new Paragraph({ spacing: { after: 120 }, children: [] }),
      heading('Syllabus Outcomes Assessed'),
      new Table({ width: { size: 9026, type: WidthType.DXA }, columnWidths: [1800, 7226], rows: outcomeRows }),

      new Paragraph({ spacing: { after: 120 }, children: [] }),
      heading('Task Description'),
      new Table({
        width: { size: 9026, type: WidthType.DXA }, columnWidths: [9026],
        rows: [new TableRow({ children: [new TableCell({
          borders, width: { size: 9026, type: WidthType.DXA },
          margins: { top: 120, bottom: 120, left: 160, right: 160 },
          children: [new Paragraph({ children: [new TextRun({ text: desc || '', size: 20, font: 'Arial' })] })]
        })]})]
      }),

      new Paragraph({ spacing: { after: 120 }, children: [] }),

      ...(topics ? [
        heading('Topics / Content Covered'),
        new Table({
          width: { size: 9026, type: WidthType.DXA }, columnWidths: [9026],
          rows: [new TableRow({ children: [new TableCell({
            borders, width: { size: 9026, type: WidthType.DXA },
            margins: { top: 120, bottom: 120, left: 160, right: 160 },
            children: [new Paragraph({ children: [new TextRun({ text: topics, size: 20, font: 'Arial' })] })]
          })]})]
        }),
        new Paragraph({ spacing: { after: 120 }, children: [] }),
      ] : []),

      new Paragraph({ spacing: { after: 200 }, children: [] }),
      new Paragraph({
        alignment: AlignmentType.CENTER,
        border: { top: { style: BorderStyle.SINGLE, size: 4, color: 'CCCCCC', space: 4 } },
        spacing: { before: 100 },
        children: [new TextRun({
          text: `Issued: ${new Date().toLocaleDateString('en-AU', { day: '2-digit', month: 'long', year: 'numeric' })}`,
          size: 16, font: 'Arial', color: '888888'
        })]
      }),
    ];

    const doc = new Document({
      styles: { default: { document: { run: { font: 'Arial', size: 20 } } } },
      sections: [{ properties: { page: { size: { width: 11906, height: 16838 }, margin: { top: 1080, right: 1080, bottom: 1080, left: 1080 } } }, children }]
    });

    const buffer = await Packer.toBuffer(doc);
    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
    const url = URL.createObjectURL(blob);
    const a = window.document.createElement('a');
    a.href = url;
    a.download = `Assessment_Notification_${year.replace(' ','')}${taskName ? '_' + taskName.replace(/[^a-zA-Z0-9]/g,'_') : ''}.docx`;
    window.document.body.appendChild(a);
    a.click();
    window.document.body.removeChild(a);
    URL.revokeObjectURL(url);

    btn.textContent = '✓ Downloaded!';
    btn.classList.add('success');
    setTimeout(() => { btn.textContent = '⬇  Generate .docx'; btn.classList.remove('success'); btn.disabled = false; }, 3000);
  } catch (e) {
    console.error(e);
    alert('Error generating document: ' + e.message);
    btn.textContent = '⬇  Generate .docx';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
